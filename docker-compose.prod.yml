# Produção - Oracle Cloud
# Backend API e Nginx (rede Docker bridge com DNS interno)

services:
  api:
    image: ${IMAGE:-ubus-api:latest}
    container_name: ubus-api
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro
    environment:
      NODE_ENV: production
      PORT: 3001
      IMAGE: ${IMAGE}
      USE_OCI_VAULT: ${USE_OCI_VAULT:-true}
      OCI_SECRET_OCID: ${OCI_SECRET_OCID}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - ubus-net

  nginx:
    image: nginx:alpine
    container_name: ubus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ubus-net

networks:
  ubus-net:
    driver: bridge


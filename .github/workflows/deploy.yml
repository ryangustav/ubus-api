name: Deploy via SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ubus-api:latest
          outputs: type=docker,dest=/tmp/ubus-api.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compress image
        run: |
          gzip -9 /tmp/ubus-api.tar
          mv /tmp/ubus-api.tar.gz ./ubus-api.tar.gz

      - name: Create deploy script and .env
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          USE_OCI_VAULT: ${{ secrets.USE_OCI_VAULT }}
          OCI_SECRET_OCID: ${{ secrets.OCI_SECRET_OCID }}
        run: |
          if [ -n "$DEPLOY_PATH" ]; then DEPLOY_DIR="$DEPLOY_PATH"; else DEPLOY_DIR='$HOME/ubus'; fi
          echo "mkdir -p $DEPLOY_DIR" > prepare.sh
          
          {
            echo "IMAGE=ubus-api:latest"
            echo "DATABASE_URL=$DATABASE_URL"
            echo "REDIS_URL=redis://redis:6379"
            echo "REDIS_HOST=redis"
            echo "REDIS_PORT=6379"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "USE_OCI_VAULT=$USE_OCI_VAULT"
            echo "OCI_SECRET_OCID=$OCI_SECRET_OCID"
          } > .env.prod
          
          cat > deploy.sh << SCRIPT
          #!/bin/bash
          set -e
          cd "$DEPLOY_DIR"
          mv -f .env.prod .env 2>/dev/null || true
          
          echo "Loading new image..."
          docker load -i ubus-api.tar.gz
          
          echo "Deploying..."
          export IMAGE="ubus-api:latest"
          docker compose -f docker-compose.prod.yml up -d --force-recreate
          docker image prune -f
          SCRIPT
          chmod +x deploy.sh prepare.sh

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_path: prepare.sh

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.prod.yml,.env.prod,nginx,ubus-api.tar.gz"
          target: ${{ secrets.DEPLOY_PATH || '~/ubus' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_path: deploy.sh

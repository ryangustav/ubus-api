# Produção - Oracle Cloud
# Backend API, Postgres e Nginx

services:
  api:
    image: ${IMAGE:-ubus-api:latest}
    container_name: ubus-api
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./.env:/app/.env:ro
    environment:
      NODE_ENV: production
      PORT: 3001
      # IMAGE comes from the shell environment (sourced from .env before up)
      IMAGE: ${IMAGE}
      # Minimal variables - most are now loaded from /app/.env by the app
      USE_OCI_VAULT: ${USE_OCI_VAULT:-true}
      OCI_SECRET_OCID: ${OCI_SECRET_OCID}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: ubus-nginx
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro

name: Deploy via SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCI Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Set up repository name
        run: |
          echo "REPO=${{ secrets.OCI_NAMESPACE }}/ubus-api" >> ${GITHUB_ENV}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.OCI_REGISTRY }}/${{ env.REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Create deploy script and .env
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          USE_OCI_VAULT: ${{ secrets.USE_OCI_VAULT }}
          OCI_SECRET_OCID: ${{ secrets.OCI_SECRET_OCID }}
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
        run: |
          if [ -n "$DEPLOY_PATH" ]; then DEPLOY_DIR="$DEPLOY_PATH"; else DEPLOY_DIR='$HOME/ubus'; fi
          echo "mkdir -p $DEPLOY_DIR" > prepare.sh
          
          {
            echo "IMAGE=$OCI_REGISTRY/$REPO:latest"
            echo "DATABASE_URL=$DATABASE_URL"
            echo "REDIS_URL=redis://redis:6379"
            echo "REDIS_HOST=redis"
            echo "REDIS_PORT=6379"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "USE_OCI_VAULT=$USE_OCI_VAULT"
            echo "OCI_SECRET_OCID=$OCI_SECRET_OCID"
          } > .env.prod
          
          cat > deploy.sh << SCRIPT
          #!/bin/bash
          set -e
          cd "$DEPLOY_DIR"
          mv -f .env.prod .env 2>/dev/null || true
          
          echo "Pulling new image..."
          export IMAGE="$OCI_REGISTRY/$REPO:latest"
          docker pull \$IMAGE
          
          echo "Deploying..."
          docker compose -f docker-compose.prod.yml up -d --force-recreate
          
          sleep 5
          echo "Running Drizzle Migrations..."
          docker exec ubus-api npx drizzle-kit migrate --config=drizzle.config.js
          
          docker image prune -f
          SCRIPT
          chmod +x deploy.sh prepare.sh

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_path: prepare.sh

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.prod.yml,.env.prod,nginx"
          target: ${{ secrets.DEPLOY_PATH || '~/ubus' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_path: deploy.sh

name: Deploy via SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Prepara o ambiente para buildar ARM64 (necessário para o servidor Ampere)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          tags: ubus-api:latest
          outputs: type=docker,dest=/tmp/ubus-api.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compress image
        run: |
          gzip -9 /tmp/ubus-api.tar
          mv /tmp/ubus-api.tar.gz ./ubus-api.tar.gz

      - name: Create deploy script
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEPLOY_DIR=${DEPLOY_PATH:-'$HOME/ubus-api'}
          echo "mkdir -p $DEPLOY_DIR" > prepare.sh
          
          cat > deploy.sh << SCRIPT
          #!/bin/bash
          set -e
          cd "$DEPLOY_DIR"
          
          echo "Loading ARM64 image..."
          docker load -i ubus-api.tar.gz
          
          echo "Deploying with Docker Compose..."
          docker compose -f docker-compose.prod.yml up -d --force-recreate
          
          docker image prune -f
          SCRIPT
          chmod +x deploy.sh prepare.sh

      - name: Prepare server directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_path: prepare.sh

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx,ubus-api.tar.gz"
          target: ${{ secrets.DEPLOY_PATH || '~/ubus-api' }}

      - name: Execute Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_path: deploy.sh

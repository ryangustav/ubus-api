services:
  mongodb:
    image: mongo:latest
    container_name: ubus-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ubus
      MONGO_INITDB_ROOT_PASSWORD: ubus
      MONGO_INITDB_DATABASE: ubus
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: mongoose => require("mongoose").connection.readyState === 1
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ubus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ubus-api
    ports:
      - "3001:3001"
    volumes:
      - ./.env:/app/.env:ro
    environment:
      DATABASE_URL: ${DATABASE_URL:-mongodb://ubus:ubus@mongodb:27017/ubus?authSource=admin}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET:-ubus-secret-change-in-prod}
      PORT: 3001
      USE_OCI_VAULT: ${USE_OCI_VAULT:-false}
      OCI_SECRET_OCID: ${OCI_SECRET_OCID}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongodb_data:
  redis_data:

name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Apenas build e push (sem deploy SSH)'
        required: false
        default: false
        type: boolean

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Get OCIR repository
        id: ocir
        uses: oracle-actions/get-ocir-repository@v1.3.0
        with:
          name: ubus-api
          compartment: ${{ secrets.OCI_COMPARTMENT_OCID }}

      - name: Log into OCIR
        uses: oracle-actions/login-ocir@v1.3.0
        with:
          auth_token: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ocir.outputs.repo_path }}:${{ github.sha }}
            ${{ steps.ocir.outputs.repo_path }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: meta
        run: echo "image=${{ steps.ocir.outputs.repo_path }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    if: ${{ !inputs.skip_deploy }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create deploy script
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -n "$DEPLOY_PATH" ]; then DEPLOY_DIR="$DEPLOY_PATH"; else DEPLOY_DIR='$HOME/ubus'; fi
          echo "mkdir -p $DEPLOY_DIR" > prepare.sh
          cat > .env.prod << ENV
          IMAGE=$IMAGE
          DATABASE_URL=$DATABASE_URL
          REDIS_URL=$REDIS_URL
          REDIS_HOST=${REDIS_HOST:-host.docker.internal}
          REDIS_PORT=${REDIS_PORT:-6379}
          JWT_SECRET=$JWT_SECRET
          ENV
          cat > deploy.sh << SCRIPT
          #!/bin/bash
          set -e
          cd "$DEPLOY_DIR"
          mv .env.prod .env 2>/dev/null || true
          export IMAGE="$IMAGE"
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --force-recreate
          docker image prune -f
          SCRIPT
          chmod +x deploy.sh

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_path: prepare.sh

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.prod.yml,.env.prod,nginx"
          target: ${{ secrets.DEPLOY_PATH || '~/ubus' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_path: deploy.sh

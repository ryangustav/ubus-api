name: Deploy via SSH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCI Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Set up repository name
        run: |
          echo "REPO=${{ secrets.OCI_NAMESPACE }}/ubus-api" >> ${GITHUB_ENV}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.OCI_REGISTRY }}/${{ env.REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Create .env file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          USE_OCI_VAULT: ${{ secrets.USE_OCI_VAULT }}
          OCI_SECRET_OCID: ${{ secrets.OCI_SECRET_OCID }}
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          REPO: ${{ env.REPO }}
        run: |
          {
            echo "IMAGE=$OCI_REGISTRY/$REPO:latest"
            echo "DATABASE_URL=$DATABASE_URL"
            echo "REDIS_URL=redis://redis:6379"
            echo "REDIS_HOST=redis"
            echo "REDIS_PORT=6379"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "USE_OCI_VAULT=$USE_OCI_VAULT"
            echo "OCI_SECRET_OCID=$OCI_SECRET_OCID"
          } > .env.prod

      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Resolve path safely even if user put ~ in secret
            RAW_PATH="${{ secrets.DEPLOY_PATH || 'ubus-api' }}"
            # Remove leading ~/ or / to avoid concatenation issues
            CLEAN_PATH="${RAW_PATH#\~/}"
            CLEAN_PATH="${CLEAN_PATH#/}"
            
            DEPLOY_ROOT="/home/${{ secrets.DEPLOY_USER }}"
            TARGET_DIR="$DEPLOY_ROOT/$CLEAN_PATH"
            
            echo "Creating directory: $TARGET_DIR"
            mkdir -p "$TARGET_DIR"
            
            # Clean up previous error (literal $HOME or ~ folders)
            rm -rf "$DEPLOY_ROOT/\$HOME" "$DEPLOY_ROOT/~" 2>/dev/null || true

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.prod.yml,.env.prod,nginx"
          # Pass the raw path, SCP handles ~/ usually, but ubus-api is safer
          target: ${{ secrets.DEPLOY_PATH || 'ubus-api' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
          OCI_AUTH_TOKEN: ${{ secrets.OCI_AUTH_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: OCI_REGISTRY,OCI_USERNAME,OCI_AUTH_TOKEN,DEPLOY_PATH,DEPLOY_USER
          script: |
            set -e
            # Resolve absolute path safely
            RAW_PATH="${DEPLOY_PATH:-ubus-api}"
            CLEAN_PATH="${RAW_PATH#\~/}"
            CLEAN_PATH="${CLEAN_PATH#/}"
            
            TARGET_DIR="/home/$DEPLOY_USER/$CLEAN_PATH"
            
            echo "Target Directory: $TARGET_DIR"
            cd "$TARGET_DIR"

            # Rename .env.prod to .env
            if [ -f .env.prod ]; then
              mv -f .env.prod .env
            fi

            if [ ! -f .env ]; then
              echo "FATAL: .env not found in $TARGET_DIR"
              ls -la
              echo "Checking parent directory..."
              ls -la ..
              exit 1
            fi

            # Login to OCI Container Registry
            echo "$OCI_AUTH_TOKEN" | docker login "$OCI_REGISTRY" -u "$OCI_USERNAME" --password-stdin

            # Source .env safely
            set -a
            source .env
            set +a

            echo "Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "Deploying..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            sleep 5
            echo "Running Drizzle Migrations..."
            docker exec ubus-api npx drizzle-kit migrate --config=drizzle.config.js

            docker image prune -f
            echo "Deploy complete!"

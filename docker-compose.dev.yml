# Apenas Postgres + Redis para desenvolvimento local
# Uso: docker compose -f docker-compose.dev.yml up -d
services:
  mongodb:
    image: mongo:latest
    container_name: ubus-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ubus
      MONGO_INITDB_ROOT_PASSWORD: ubus
      MONGO_INITDB_DATABASE: ubus
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: mongoose => require("mongoose").connection.readyState === 1
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ubus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
